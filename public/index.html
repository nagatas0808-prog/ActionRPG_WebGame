<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>2D Action RPG - Just Evasion</title>

    <!-- Google Search Console 所有権確認用メタタグ (共通タグ) -->
    <meta name="google-site-verification" content="ECNA6rCMysSFdAgO_tGT5OFHiEhy1hy99Dxd0-k-lWQ" />

    <!-- Google AdSense 審査・所有権確認用コード (共通タグ) -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5383957100145583"
        crossorigin="anonymous"></script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css?v=10">
</head>

<body>
    <div id="game-container">
        <!-- UI Overlay -->
        <div id="ui-layer">
            <div id="game-view-scaler">
                <div class="top-bar">
                    <div class="stats">
                        <span class="stat-label">TIME: <span id="survival-timer">1:00</span></span>
                        <span class="stat-label">討伐数: <span id="score">0</span></span>
                        <span class="stat-label">Lv: <span id="player-level">1</span></span>
                    </div>
                    <div class="bars">
                        <div class="bar-container hp-container">
                            <div id="health-bar" class="bar hp"></div>
                        </div>
                        <div class="bar-container exp-container">
                            <div id="exp-bar" class="bar exp"></div>
                        </div>
                        <div class="bar-container sp-container">
                            <div id="special-bar" class="bar sp"></div>
                        </div>
                    </div>
                </div>

                <!-- Game Canvas -->
                <canvas id="gameCanvas" width="800" height="600"></canvas>
            </div>

            <!-- Boss HP Bar (Hidden by default) -->
            <div id="boss-hud" class="hide">
                <div class="boss-name">不明なる厄災</div>
                <div class="bar-container boss-hp-container">
                    <div id="boss-hp-bar" class="bar boss-hp"></div>
                </div>
            </div>
    </div>

    <script src="script.js?v=10"></script>
</body>

</html>
